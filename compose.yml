services:
    mailhog:
        container_name: loteria-mail
        image: mailhog/mailhog:latest
        restart: always
        ports:
            - 8025:8025
            - 1025:1025

    mysqldb:
        container_name: loteria-mysqldb
        image: mysql:5.7.32
        restart: always
        working_dir: /app
        ports:
            - 3306:3306
        environment:
            - MYSQL_ROOT_PASSWORD=loteria
            - MYSQL_DATABASE=loteria
            - MYSQL_USER=loteria
            - MYSQL_PASSWORD=loteria
        volumes:
            - type: volume
              source: mysqldb
              target: /var/lib/mysql
            - .:/app

    nginx:
        container_name: loteria-nginx
        image: nginx:latest
        restart: always
        working_dir: /app
        volumes:
            - .:/app
            - ./docker/etc/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        ports:
            - 80:80
        environment:
            - NGINX_HOST=loteria.local.paginaemconstrucao.net.br
            - NGINX_PORT=80

    php-fpm:
        container_name: loteria-php-fpm
        build: 
            context: docker
            dockerfile: Dockerfile-php-8.0.10-fpm
        restart: always
        working_dir: /app
        volumes:
            - .:/app
        ports:
            - 9000:9000
        links:
            - mysqldb
            - mailhog
        depends_on:
            - mysqldb
            - nginx
            - mailhog

volumes:
    mysqldb:
        name: loteria-mysqldb